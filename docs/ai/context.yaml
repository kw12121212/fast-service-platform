schema: fast-service-platform-ai-context/v1
project:
  name: Fast Service Platform
  type: ai-oriented-enterprise-component-platform
  v1_target:
    domain: enterprise-internal-management
    application_shape: monolith
  runtime_ai_features_in_repo: false

required_reading:
  bootstrap:
    - README.md
    - RTK.md
    - AGENTS.md
    - .spec-driven/config.yaml
    - .spec-driven/specs/INDEX.md
  change_specific:
    - relevant-main-spec-files
    - docs/ai/playbooks/*.md

repository_constraints:
  dependency_boundary:
    allowed:
      - Lealone-Platform
      - repository-internal-dependencies
    forbidden:
      - additional-external-software-libraries-without-spec
  workflow:
    - non-trivial-changes-must-start-in-spec-driven
    - do-not-expand-scope-without-updating-proposal
  product_boundary:
    - do-not-add-in-repo-ai-chat-or-prompt-intake
    - keep-v1-scope-on-enterprise-management
    - keep-v1-shape-monolithic

ai_indexes:
  repository_entry:
    - docs/ai/quickstart.md
    - docs/ai/context.yaml
  schemas:
    - docs/ai/schemas/app-manifest.schema.json
    - docs/ai/schemas/module-registry.schema.json
    - docs/ai/schemas/derived-app-lifecycle-contract.schema.json
    - docs/ai/schemas/derived-app-lifecycle-metadata.schema.json
    - docs/ai/schemas/platform-release-advisory.schema.json
    - docs/ai/schemas/generated-app-verification-contract.schema.json
    - docs/ai/schemas/app-assembly-compatibility-suite.schema.json
  module_registry: docs/ai/module-registry.json
  assembly_contract: docs/ai/app-assembly-contract.json
  derived_app_lifecycle_contract: docs/ai/derived-app-lifecycle-contract.json
  platform_release_metadata: docs/ai/platform-release.json
  platform_release_advisory: docs/ai/platform-release-advisory.json
  generated_app_verification_contract: docs/ai/generated-app-verification-contract.json
  compatibility_suite: docs/ai/compatibility/app-assembly-suite.json
  example_manifests:
    - docs/ai/manifests/default-baseline-app.json
    - docs/ai/manifests/core-admin-app.json

toolchain:
  java:
    version: 25
    default_home: $HOME/.sdkman/candidates/java/25.0.2-tem
  maven:
    version: 3.9.x
    default_bin: $HOME/.sdkman/candidates/maven/current/bin/mvn
  node:
    version: 24
    manager: nvm
  bun:
    role:
      - frontend-package-manager
      - frontend-script-runner

workspaces:
  backend:
    path: backend
    responsibility: runnable-single-module-maven-backend
    key_paths:
      service_sql: backend/src/main/resources/sql/services.sql
      table_sql: backend/src/main/resources/sql/tables.sql
      java_impl_root: backend/src/main/java/com/fastservice/platform/backend
      tests_root: backend/src/test/java/com/fastservice/platform/backend
      demo_sql: backend/src/main/resources/sql/demo.sql
      demo_support: backend/src/main/java/com/fastservice/platform/backend/demo/DemoDataSupport.java
  frontend:
    path: frontend
    responsibility: runnable-pc-admin-console
    key_paths:
      app_shell: frontend/src/app
      features: frontend/src/features
      admin_components: frontend/src/components/admin
      ui_components: frontend/src/components/ui
      api_access: frontend/src/lib/api
      tests: frontend/src/app
  java_assembly_cli:
    path: tools/java-assembly-cli
    responsibility: compatible-java-app-assembly-implementation
    key_paths:
      pom: tools/java-assembly-cli/pom.xml
      main_class: tools/java-assembly-cli/src/main/java/com/fastservice/platform/tools/assemblycli/AppAssemblyCli.java
      tests: tools/java-assembly-cli/src/test/java/com/fastservice/platform/tools/assemblycli
  java_generated_app_verifier:
    path: tools/java-generated-app-verifier
    responsibility: compatible-java-generated-app-verifier
    key_paths:
      pom: tools/java-generated-app-verifier/pom.xml
      main_class: tools/java-generated-app-verifier/src/main/java/com/fastservice/platform/tools/generatedappverifier/GeneratedAppVerifierCli.java
      tests: tools/java-generated-app-verifier/src/test/java/com/fastservice/platform/tools/generatedappverifier

high_frequency_change_playbooks:
  - docs/ai/playbooks/backend-domain-change.md
  - docs/ai/playbooks/derive-app-from-platform.md
  - docs/ai/playbooks/evaluate-derived-app-upgrade.md
  - docs/ai/playbooks/frontend-admin-change.md
  - docs/ai/playbooks/integration-demo-and-smoke.md

validation_entrypoints:
  assembly: ./scripts/verify-app-assembly.sh
  assembly_compatibility: node ./scripts/verify-app-assembly-compatibility.mjs
  assembly_java_scaffold: ./scripts/scaffold-derived-app-java.sh <manifest-path> <absolute-output-dir>
  derived_app_upgrade_evaluation: ./scripts/evaluate-derived-app-upgrade.sh <generated-app-dir>
  platform_release_advisory: ./scripts/show-platform-release-advisory.sh [generated-app-dir]
  generated_app_reference_verifier: node ./scripts/verify-derived-app.mjs <generated-app-dir>
  generated_app_java_verifier: ./scripts/verify-derived-app-java.sh <generated-app-dir>
  backend: ./scripts/verify-backend.sh
  frontend: ./scripts/verify-frontend.sh
  fullstack: ./scripts/verify-fullstack.sh

smoke_path:
  route_prefix: /service
  proxy_owner: frontend/vite-dev-server
  backend_target: http://127.0.0.1:8080
  expected_checks:
    - proxy-reaches-user-service-list-endpoint
    - proxy-reaches-project-service-list-endpoint
    - responses-are-json-arrays

local_dependencies:
  required_source_repositories:
    - vendor/lealone
    - vendor/lealone-platform
  install_script: ./scripts/install-lealone-source-deps.sh

troubleshooting:
  primary_doc: docs/ai/troubleshooting.md
